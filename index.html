<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Automation Branch — সহজ ৬ মাসের Business Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#2d2e3e; --dot:#43445a;
  --node-bg:#414258; --node-border:#575a75; --node-hover:#6b6e8f;
  --accent:#ff6d5a; --accent2:#7d5dfc;
  --text:#eceef7; --text-dim:#a2a5c4;
  --wire:#8b8ea8;
  --panel:#383a4d; --panel-border:#4a4c63;
  --green:#2fbf8f; --yellow:#f5c96b; --blue:#5aa9f5; --purple:#9d7bfc; --rose:#f56d8f; --cyan:#4dd6e8;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--canvas);color:var(--text)}

/* ═══ Top bar (n8n style) ═══ */
.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:#41435a;border-bottom:1px solid #52546e;display:flex;align-items:center;gap:12px;padding:0 16px;z-index:60}
.wf-icon{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#7d5dfc,#4dd6e8);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.wf-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wf-tag{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);background:#4c4e68;border:1px solid #5c5e7c;padding:3px 8px;border-radius:20px;white-space:nowrap}
.tb-spacer{flex:1}
.toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim);font-weight:600;white-space:nowrap}
.switch{width:36px;height:20px;border-radius:20px;background:var(--green);position:relative;cursor:pointer}
.switch::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;right:2px}
.btn{font-family:'Inter',sans-serif;font-weight:700;font-size:12px;border:1px solid #5c5e7c;background:#4c4e68;color:var(--text);border-radius:8px;padding:8px 14px;cursor:pointer;white-space:nowrap;transition:.15s}
.btn:hover{background:#585a78}
.btn.primary{background:var(--accent);border-color:var(--accent)}
.btn.primary:hover{background:#ff8271}
.btn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

/* ═══ Canvas ═══ */
#viewport{position:fixed;inset:56px 0 0 0;overflow:hidden;cursor:grab;background-color:var(--canvas);background-image:radial-gradient(circle,var(--dot) 1.2px,transparent 1.2px);background-size:20px 20px}
#viewport.panning{cursor:grabbing}
#world{position:absolute;top:0;left:0;transform-origin:0 0;width:0;height:0}
#wires{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
.wire{fill:none;stroke:var(--wire);stroke-width:2}
.wire-flow{fill:none;stroke:var(--cyan);stroke-width:2;stroke-dasharray:6 84;animation:flow 3s linear infinite;opacity:.9}
@keyframes flow{to{stroke-dashoffset:-90}}

/* ═══ n8n node (square icon style) ═══ */
.nnode{position:absolute;width:100px;cursor:grab;user-select:none}
.nnode .box{width:100px;height:100px;background:var(--node-bg);border:2px solid var(--node-border);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:38px;position:relative;transition:border-color .15s,box-shadow .15s;box-shadow:0 4px 14px rgba(0,0,0,.3)}
.nnode:hover .box{border-color:var(--node-hover)}
.nnode.selected .box{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,109,90,.25),0 4px 18px rgba(0,0,0,.4)}
.nnode.dragging{cursor:grabbing;z-index:10}
.nnode.trigger .box{border-radius:40px 14px 14px 40px}
.nnode .badge{position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.05em;color:#1c1d28;padding:2px 8px;border-radius:10px;white-space:nowrap}
.nnode .check{position:absolute;bottom:-7px;right:-7px;width:20px;height:20px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;border:2px solid var(--canvas)}
.nnode .lbl{text-align:center;margin-top:9px;font-size:12.5px;font-weight:700;line-height:1.3;width:150px;margin-left:-25px}
.nnode .sub{text-align:center;font-size:10.5px;color:var(--text-dim);margin-top:2px;width:150px;margin-left:-25px;line-height:1.35}
.port{position:absolute;width:12px;height:12px;border-radius:50%;background:var(--canvas);border:2px solid var(--wire);top:44px}
.port.in{left:-7px}.port.out{right:-7px}
.nnode .plus{position:absolute;right:-30px;top:42px;width:16px;height:16px;border-radius:4px;background:#4c4e68;color:var(--text-dim);font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:.15s}
.nnode:hover .plus{opacity:1}

/* ═══ Sticky notes ═══ */
.sticky{position:absolute;border-radius:10px;padding:14px 16px;cursor:grab;user-select:none;border:1px solid;box-shadow:0 4px 16px rgba(0,0,0,.25);transition:box-shadow .15s;backdrop-filter:blur(2px)}
.sticky:hover{box-shadow:0 8px 24px rgba(0,0,0,.4)}
.sticky.selected{box-shadow:0 0 0 3px rgba(255,109,90,.4),0 8px 24px rgba(0,0,0,.4)}
.sticky.dragging{cursor:grabbing;z-index:10}
.sticky h3{font-size:13px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.sticky ul{list-style:none}
.sticky li{font-size:11px;line-height:1.55;padding:2.5px 0 2.5px 14px;position:relative;font-weight:500}
.sticky li::before{content:'▸';position:absolute;left:0;opacity:.7}
.sticky a{color:var(--cyan);font-weight:800;text-decoration:underline;text-underline-offset:2px;cursor:pointer}
.sticky a:hover{color:#a8f5ff}
.st-yellow{background:rgba(245,201,107,.13);border-color:rgba(245,201,107,.55)}.st-yellow h3,.st-yellow li{color:#ffe3a8}.st-yellow li::before{color:#f5c96b}
.st-green{background:rgba(47,191,143,.12);border-color:rgba(47,191,143,.55)}.st-green h3,.st-green li{color:#a8f0d8}.st-green li::before{color:#2fbf8f}
.st-blue{background:rgba(90,169,245,.12);border-color:rgba(90,169,245,.55)}.st-blue h3,.st-blue li{color:#bcdcff}.st-blue li::before{color:#5aa9f5}
.st-purple{background:rgba(157,123,252,.13);border-color:rgba(157,123,252,.55)}.st-purple h3,.st-purple li{color:#d8c8ff}.st-purple li::before{color:#9d7bfc}
.st-rose{background:rgba(245,109,143,.12);border-color:rgba(245,109,143,.55)}.st-rose h3,.st-rose li{color:#ffc4d4}.st-rose li::before{color:#f56d8f}
.st-gray{background:rgba(162,165,196,.1);border-color:rgba(162,165,196,.45)}.st-gray h3,.st-gray li{color:#d5d7ea}.st-gray li::before{color:#a2a5c4}

/* ═══ Side panel (n8n NDV style) ═══ */
#panel{position:fixed;top:56px;right:0;bottom:0;width:330px;background:var(--panel);border-left:1px solid var(--panel-border);transform:translateX(100%);transition:transform .22s ease;z-index:70;display:flex;flex-direction:column}
#panel.open{transform:translateX(0)}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--panel-border)}
.panel-head h3{font-size:14px;font-weight:800}
.close-x{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-dim);line-height:1}
.panel-body{flex:1;overflow-y:auto;padding:18px}
.field{margin-bottom:15px}
.field label{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px}
.field input,.field textarea{width:100%;border:1px solid var(--panel-border);border-radius:8px;padding:10px 12px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);background:#2f3143;resize:vertical}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.field textarea{min-height:160px;line-height:1.6}
.hint{font-size:10.5px;color:var(--text-dim);margin-top:5px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{width:26px;height:26px;border-radius:8px;cursor:pointer;border:2px solid transparent}
.chip.active{border-color:#fff}
.panel-foot{padding:14px 18px;border-top:1px solid var(--panel-border);display:flex;gap:10px}
.btn.danger{color:#ffb4c2;border-color:#8f4457;background:#57303c}
.btn.danger:hover{background:#6b3a49}

/* ═══ Zoom + toast ═══ */
.zoomctl{position:fixed;left:14px;bottom:14px;display:flex;gap:5px;z-index:50;background:#41435a;border:1px solid #52546e;border-radius:10px;padding:5px}
.zoomctl button{width:32px;height:32px;border:none;background:transparent;color:var(--text-dim);font-size:16px;font-weight:700;border-radius:7px;cursor:pointer}
.zoomctl button:hover{background:#52546e;color:var(--text)}
.zoomctl .pct{font-family:'JetBrains Mono',monospace;font-size:11px;display:flex;align-items:center;padding:0 6px;color:var(--text-dim)}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(80px);background:#1c1d28;border:1px solid #52546e;color:var(--text);font-size:12px;font-weight:600;padding:10px 18px;border-radius:10px;transition:.3s;z-index:99;opacity:0}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.hint-bar{position:fixed;left:14px;top:68px;background:#41435acc;border:1px solid #52546e;border-radius:10px;padding:9px 13px;z-index:50;font-size:10.5px;color:var(--text-dim);line-height:1.6;max-width:190px;backdrop-filter:blur(4px)}
@media (max-width:640px){#panel{width:100%}.hint-bar{display:none}.wf-tag{display:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

<div class="topbar">

    <div class="field" id="rowColor"><label>কালার</label>
      <div class="chips" id="chips">

        <span class="chip" data-c="blue" style="background:#5aa9f5"></span>
        <span class="chip" data-c="purple" style="background:#9d7bfc"></span>
        <span class="chip" data-c="rose" style="background:#f56d8f"></span>

  </div>
  <div class="panel-foot">

    <button class="btn primary" id="doneBtn" style="flex:1">সম্পন্ন</button>
  </div>
</aside>

<div id="toast"></div>

    {id:'s-team',type:'sticky',x:820,y:800,w:340,c:'blue',title:'👥 Team ও কী Skill লাগবে',
     items:['আমি/Branch Lead — sales ও client manage','1 জন AI Automation Developer','Month 3 থেকে দরকার হলে lead-gen person','শুরুতে existing frontend/design/QA support','Developer জানবে: n8n, API, OAuth, JavaScript','আরও লাগবে: database, LLM, deployment','Hire করার আগে paid technical test','বর্তমান developer busy হলে তবেই 2nd developer']},
    {id:'s-competition',type:'sticky',x:1200,y:800,w:340,c:'yellow',title:'⚔️ Competition থেকে আলাদা হব কীভাবে',
     items:['Competition: low-price Fiverr seller','General n8n/Make freelancer','Specialized automation agency','Ready-made SaaS software','আমরা আগে client-এর real problem বুঝব','তার industry অনুযায়ী demo + integration','Human support, monitoring ও documentation দেব','Shopify/marketing experience কাজে লাগাব']},
    {id:'s-risk',type:'sticky',x:1580,y:800,w:380,c:'rose',title:'⚠️ Important Warning',
     items:['সব service একসাথে launch করব না','AI সব কাজ 100% নিজে করবে—এমন promise নয়','Unlimited API/voice/WhatsApp cost package-এ নয়','Client password/key personal account-এ রাখব না','কাজ শুরুর আগে scope ও revision limit লিখব','Problem হলে human support ও monitoring থাকবে','Fiverr-এর rule কখনও break করা যাবে না','Revenue numbers শুধু target—guarantee নয়']},
  ],
  edges:[['start','m1'],['m1','m2'],['m2','m3'],['m3','m4'],['m4','m5'],['m5','m6']]
};

/* ═══════════ VIEW / PAN / ZOOM ═══════════ */
const vp=document.getElementById('viewport'),world=document.getElementById('world'),
      itemsEl=document.getElementById('items'),wireG=document.getElementById('wireG');
let view={x:20,y:20,k:1};
function applyView(){world.style.transform=`translate(${view.x}px,${view.y}px) scale(${view.k})`;document.getElementById('zpct').textContent=Math.round(view.k*100)+'%';}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2200);}

let panning=false,ps={};
vp.addEventListener('pointerdown',e=>{
  if(e.target.closest('.nnode')||e.target.closest('.sticky'))return;
  panning=true;vp.classList.add('panning');ps={x:e.clientX,y:e.clientY,vx:view.x,vy:view.y};
  vp.setPointerCapture(e.pointerId);
});
vp.addEventListener('pointermove',e=>{if(!panning)return;view.x=ps.vx+(e.clientX-ps.x);view.y=ps.vy+(e.clientY-ps.y);applyView();});
vp.addEventListener('pointerup',()=>{panning=false;vp.classList.remove('panning');});
vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=vp.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const nk=Math.min(2.2,Math.max(.25,view.k*(e.deltaY<0?1.1:.9)));
  view.x=mx-(mx-view.x)*(nk/view.k);view.y=my-(my-view.y)*(nk/view.k);view.k=nk;applyView();
},{passive:false});
document.getElementById('zin').onclick=()=>{view.k=Math.min(2.2,view.k*1.15);applyView();};
document.getElementById('zout').onclick=()=>{view.k=Math.max(.25,view.k/1.15);applyView();};
document.getElementById('zfit').onclick=fitView;
function fitView(){
  const xs=state.nodes.map(n=>n.x),ys=state.nodes.map(n=>n.y);
  const minX=Math.min(...xs)-50,minY=Math.min(...ys)-50,
        maxX=Math.max(...state.nodes.map(n=>n.x+(n.w||150)))+60,
        maxY=Math.max(...state.nodes.map(n=>n.y+240));
  const r=vp.getBoundingClientRect();
  view.k=Math.min(1.15,Math.max(.25,Math.min(r.width/(maxX-minX),r.height/(maxY-minY))));
  view.x=(r.width-(maxX-minX)*view.k)/2-minX*view.k;
  view.y=(r.height-(maxY-minY)*view.k)/2-minY*view.k;
  applyView();
}

/* ═══════════ RENDER ═══════════ */
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function formatItem(s){
  const raw=String(s??'');
  const match=raw.match(/^\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)$/);
  if(!match)return esc(raw);
  return `<a href="${esc(match[2])}" target="_blank" rel="noopener noreferrer">${esc(match[1])}</a>`;
}
function render(){
  itemsEl.innerHTML='';
  state.nodes.forEach(n=>{
    let el;
    if(n.type==='node'){
      el=document.createElement('div');
      el.className='nnode'+(n.trigger?' trigger':'');
      el.innerHTML=`
        <div class="box" style="border-color:${sel(n)?'':''}">${esc(n.icon||'⬡')}
          <span class="badge" style="background:${BADGE_C[n.c]||BADGE_C.purple}">${esc(n.badge||'')}</span>
          <span class="check">✓</span>
          ${n.trigger?'':'<span class="port in"></span>'}<span class="port out"></span>
          <span class="plus">+</span>
        </div>
        <div class="lbl">${esc(n.title)}</div>
        ${n.sub?`<div class="sub">${esc(n.sub)}</div>`:''}`;
    }else{
      el=document.createElement('div');
      el.className='sticky st-'+(n.c||'gray');
      el.style.width=(n.w||300)+'px';
      el.innerHTML=`<h3>${esc(n.title)}</h3><ul>${(n.items||[]).map(i=>`<li>${formatItem(i)}</li>`).join('')}</ul>`;
    }
    el.dataset.id=n.id;
    el.style.left=n.x+'px';el.style.top=n.y+'px';
    if(n.id===selId)el.classList.add('selected');
    itemsEl.appendChild(el);
    makeDraggable(el,n);
  });
  drawWires();
}
function sel(n){return n.id===selId;}
function drawWires(){
  wireG.innerHTML='';
  state.edges.forEach(([a,b])=>{
    const A=state.nodes.find(n=>n.id===a),B=state.nodes.find(n=>n.id===b);
    if(!A||!B)return;
    const x1=A.x+102,y1=A.y+50,x2=B.x-2,y2=B.y+50;
    const dx=Math.max(40,Math.abs(x2-x1)/2);
    const d=`M ${x1} ${y1} C ${x1+dx} ${y1}, ${x2-dx} ${y2}, ${x2} ${y2}`;
    const p1=document.createElementNS('http://www.w3.org/2000/svg','path');
    p1.setAttribute('d',d);p1.setAttribute('class','wire');wireG.appendChild(p1);
    const p2=document.createElementNS('http://www.w3.org/2000/svg','path');
    p2.setAttribute('d',d);p2.setAttribute('class','wire-flow');wireG.appendChild(p2);
  });
}

/* ═══════════ DRAG + SELECT ═══════════ */
let selId=null;
function makeDraggable(el,n){
  let drag=null,moved=false;
  el.addEventListener('pointerdown',e=>{
    e.stopPropagation();moved=false;
    if(e.target.closest('a'))return;
    drag={sx:e.clientX,sy:e.clientY,nx:n.x,ny:n.y};
    el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove',e=>{
    if(!drag)return;
    const dx=(e.clientX-drag.sx)/view.k,dy=(e.clientY-drag.sy)/view.k;
    if(Math.abs(dx)>3||Math.abs(dy)>3){moved=true;el.classList.add('dragging');}
    n.x=drag.nx+dx;n.y=drag.ny+dy;
    el.style.left=n.x+'px';el.style.top=n.y+'px';drawWires();
  });
  el.addEventListener('pointerup',e=>{el.classList.remove('dragging');if(!e.target.closest('a')&&!moved)openEditor(n.id);drag=null;});
}

/* ═══════════ EDITOR ═══════════ */
const panel=document.getElementById('panel');
const F=id=>document.getElementById(id);
function openEditor(id){
  selId=id;
  const n=state.nodes.find(x=>x.id===id);if(!n)return;
  const isNode=n.type==='node';
  F('panelTitle').textContent=isNode?'নোড এডিট':'নোট এডিট';
  F('rowIcon').style.display=isNode?'':'none';
  F('rowBadge').style.display=isNode?'':'none';
  F('rowSub').style.display=isNode?'':'none';
  F('rowItems').style.display=isNode?'none':'';
  F('rowW').style.display=isNode?'none':'';
  F('fIcon').value=n.icon||'';F('fBadge').value=n.badge||'';
  F('fTitle').value=n.title||'';F('fSub').value=n.sub||'';
  F('fItems').value=(n.items||[]).join('\n');F('fW').value=n.w||300;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.c===n.c));
  panel.classList.add('open');render();
}
function liveUpdate(){
  const n=state.nodes.find(x=>x.id===selId);if(!n)return;
  if(n.type==='node'){n.icon=F('fIcon').value;n.badge=F('fBadge').value;n.sub=F('fSub').value;}
  else{n.items=F('fItems').value.split('\n').map(s=>s.trim()).filter(Boolean);n.w=Math.max(160,Math.min(520,+F('fW').value||300));}
  n.title=F('fTitle').value;
  render();
}
['fIcon','fBadge','fTitle','fSub','fItems','fW'].forEach(id=>F(id).addEventListener('input',liveUpdate));
document.getElementById('chips').addEventListener('click',e=>{
  const c=e.target.closest('.chip');if(!c)return;
  const n=state.nodes.find(x=>x.id===selId);if(!n)return;
  n.c=c.dataset.c;
  document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x===c));
  render();
});
function closePanel(){panel.classList.remove('open');selId=null;render();}
F('closePanel').onclick=F('doneBtn').onclick=closePanel;
F('delBtn').onclick=()=>{
  if(!selId)return;
  state.nodes=state.nodes.filter(n=>n.id!==selId);
  state.edges=state.edges.filter(([a,b])=>a!==selId&&b!==selId);
  closePanel();toast('ডিলিট হয়েছে');
};

/* ═══════════ ADD / SAVE / IMPORT ═══════════ */
function centerPos(){const r=vp.getBoundingClientRect();return{x:(r.width/2-view.x)/view.k,y:(r.height/2-view.y)/view.k};}
document.getElementById('addNodeBtn').onclick=()=>{
  const p=centerPos(),id='n'+Date.now();
  state.nodes.push({id,type:'node',x:p.x-50,y:p.y-50,icon:'🧩',badge:'NEW',c:'blue',title:'নতুন ধাপ',sub:''});
  render();openEditor(id);toast('নতুন নোড যোগ হয়েছে');
};
document.getElementById('addStickyBtn').onclick=()=>{
  const p=centerPos(),id='s'+Date.now();
  state.nodes.push({id,type:'sticky',x:p.x-140,y:p.y-60,w:280,c:'yellow',title:'📝 নতুন নোট',items:['এখানে পয়েন্ট লিখুন']});
  render();openEditor(id);toast('নতুন নোট যোগ হয়েছে');
};
document.getElementById('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='ai-automation-branch-plan.json';a.click();
  URL.revokeObjectURL(a.href);toast('সেভ হয়েছে — JSON ডাউনলোড ফোল্ডারে');
};
document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
document.getElementById('importFile').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{
    const d=JSON.parse(r.result);
    if(Array.isArray(d.nodes)&&Array.isArray(d.edges)){state=d;selId=null;render();fitView();toast('রোডম্যাপ লোড হয়েছে');}
    else toast('ফাইল ফরম্যাট ঠিক নেই');
  }catch{toast('JSON পড়া যায়নি');}};
  r.readAsText(f);e.target.value='';
});

render();fitView();
window.addEventListener('resize',drawWires);
</script>
